<header class="navbar" [class.navbar--scrolled]="useLightSkin()">
  <div class="navbar__inner">
    <a href="#home" (click)="close()" class="navbar__logo">
      SEMOG<span class="navbar__logo-accent">DEV</span>
    </a>

    <nav class="navbar__links" aria-label="Navegação principal">
      @for (item of navItems; track item.anchor) {
        <a [href]="'#' + item.anchor" class="navbar__link">
          {{ item.label }}
        </a>
      }
    </nav>

    <button
      type="button"
      mat-icon-button
      class="navbar__theme-toggle"
      [attr.aria-label]="
        themeService.theme() === 'dark' ? 'Ativar modo claro' : 'Ativar modo escuro'
      "
      (click)="themeService.toggle()"
    >
      <mat-icon>{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <a mat-flat-button href="#contato" class="navbar__cta">Fale comigo</a>

    <button
      type="button"
      mat-icon-button
      class="navbar__toggle"
      aria-label="Abrir menu"
      [attr.aria-expanded]="open()"
      (click)="toggle()"
    >
      <mat-icon>menu</mat-icon>
    </button>
  </div>
</header>

@if (open()) {
  <div
    class="navbar__backdrop"
    role="button"
    tabindex="0"
    aria-label="Fechar menu"
    (click)="close()"
    (keydown.enter)="close()"
    (keydown.escape)="close()"
  ></div>

  <div class="navbar__drawer" role="dialog" aria-modal="true" aria-label="Menu de navegação">
    <div class="navbar__drawer-header">
      <button type="button" mat-icon-button aria-label="Fechar menu" (click)="close()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    @for (item of navItems; track item.anchor) {
      <a [href]="'#' + item.anchor" class="navbar__drawer-link" (click)="close()">
        {{ item.label }}
      </a>
    }

    <a mat-flat-button href="#contato" class="navbar__drawer-cta" (click)="close()">
      Fale comigo
    </a>

    <button type="button" class="navbar__drawer-theme-toggle" (click)="themeService.toggle()">
      <mat-icon>{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      {{ themeService.theme() === 'dark' ? 'Modo claro' : 'Modo escuro' }}
    </button>
  </div>
}
