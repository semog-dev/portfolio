<footer class="footer">
  <div class="footer__top">
    <div class="footer__container">
      <div class="footer__brand">
        <a routerLink="/" class="footer__logo">
          SEMOG<span class="footer__logo-accent">DEV</span>
        </a>

        <div class="footer__socials">
          <a
            [href]="socialLinks.github"
            target="_blank"
            rel="noopener noreferrer"
            class="footer__social-link"
            aria-label="GitHub"
          >
            <app-brand-icon name="github" [size]="20" />
          </a>
          <a
            [href]="socialLinks.linkedin"
            target="_blank"
            rel="noopener noreferrer"
            class="footer__social-link"
            aria-label="LinkedIn"
          >
            <app-brand-icon name="linkedin" [size]="20" />
          </a>
          <a [href]="'mailto:' + socialLinks.email" class="footer__social-link" aria-label="E-mail">
            <mat-icon>email</mat-icon>
          </a>
        </div>
      </div>

      <div class="footer__links">
        <h3 class="footer__heading">Links</h3>
        <nav class="footer__nav" aria-label="Links do rodapé">
          @for (item of navItems; track item.path) {
            <a [routerLink]="item.path" class="footer__link">{{ item.label }}</a>
          }
        </nav>
      </div>
    </div>
  </div>

  <div class="footer__bottom">
    <div class="footer__bottom-inner">
      <p class="footer__copy">{{ footerText }}</p>
    </div>
  </div>
</footer>
