<section class="hero">
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__bg-gradient"></div>
  </div>

  <div class="hero__content">
    <p class="hero__greeting">{{ hero.greeting }}</p>

    <h1 class="hero__headline">
      {{ hero.headline }}
      <span class="hero__headline-accent">{{ hero.headlineAccent }}</span>
    </h1>

    <p class="hero__subtitle">{{ hero.subtitle }}</p>

    <div class="hero__actions">
      <a
        mat-flat-button
        class="hero__btn-primary"
        [href]="socialLinks.github"
        target="_blank"
        rel="noopener"
      >
        <app-brand-icon name="github" [size]="20" />
        GitHub
      </a>
      <a
        mat-stroked-button
        class="hero__btn-secondary"
        [href]="socialLinks.linkedin"
        target="_blank"
        rel="noopener"
      >
        <app-brand-icon name="linkedin" [size]="20" />
        LinkedIn
      </a>
    </div>
  </div>
</section>
