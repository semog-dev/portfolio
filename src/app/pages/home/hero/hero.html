<section class="flex min-h-[80vh] flex-col justify-center gap-6 px-6 py-24 md:px-12">
  <p class="font-sans text-sm tracking-[0.2em] text-muted-foreground uppercase md:text-base">
    {{ hero.greeting }}
  </p>

  <h1 class="max-w-4xl font-display text-4xl font-black leading-[1.05] text-foreground md:text-7xl">
    {{ hero.headline }} <span class="text-accent">{{ hero.headlineAccent }}</span>
  </h1>

  <div class="mt-4 flex items-center gap-4">
    <a
      [href]="socialLinks.github"
      target="_blank"
      rel="noopener"
      aria-label="GitHub"
      class="flex h-12 w-12 items-center justify-center rounded-full border border-border text-foreground transition-colors hover:border-accent hover:text-accent"
    >
      <lucide-icon [img]="GithubIcon" [size]="20" />
    </a>
    <a
      [href]="socialLinks.linkedin"
      target="_blank"
      rel="noopener"
      aria-label="LinkedIn"
      class="flex h-12 w-12 items-center justify-center rounded-full border border-border text-foreground transition-colors hover:border-accent hover:text-accent"
    >
      <lucide-icon [img]="LinkedinIcon" [size]="20" />
    </a>
  </div>
</section>
