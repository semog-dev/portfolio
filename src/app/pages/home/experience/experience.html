<section class="experience">
  <div class="experience__container">
    <p class="experience__eyebrow">Trajetória</p>
    <h2 class="experience__title">Experiência</h2>

    <div class="experience__grid">
      @for (exp of experiences; track exp.company) {
        <article class="experience-card">
          <h3 class="experience-card__title">{{ exp.company }}</h3>
          <p class="experience-card__period">{{ exp.period }}</p>
          <p class="experience-card__description">{{ exp.description }}</p>
          <p class="experience-card__tech">Tecnologias utilizadas: {{ exp.technologies }}</p>
        </article>
      }
    </div>
  </div>
</section>
