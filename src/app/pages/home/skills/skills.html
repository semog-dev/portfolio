<section class="skills">
  <div class="skills__container">
    <p class="skills__eyebrow">Stack</p>
    <h2 class="skills__title">Competências</h2>

    <div class="skills__groups">
      @for (group of skillGroups; track group.category) {
        <div class="skills__group">
          <p class="skills__category">{{ group.category }}</p>

          <div class="skills__pills">
            @for (skill of group.skills; track skill) {
              <span class="skill-pill" [class]="'skill-pill--' + colorVariant(group.category)">
                {{ skill }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
