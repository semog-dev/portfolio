<section class="about">
  <div class="about__container">
    <p class="about__eyebrow">Sobre mim</p>
    <h2 class="about__title">
      {{ about.title }} <span class="about__title-accent">{{ about.titleAccent }}</span>
    </h2>
    <p class="about__intro">{{ about.intro }}</p>

    <div class="about__grid">
      <img [src]="about.photo" alt="Foto de perfil" class="about__photo" />

      <div class="about__content">
        @for (p of about.paragraphs; track p) {
          <p class="about__paragraph">{{ p }}</p>
        }

        <div class="about__actions">
          <a mat-stroked-button routerLink="/contato" class="about__btn-contact">
            Entre em contato comigo
          </a>
          <a
            mat-flat-button
            class="about__btn-cv"
            [href]="about.cvUrl"
            download
            target="_blank"
            rel="noopener"
          >
            <mat-icon>download</mat-icon>
            Baixar CV
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
